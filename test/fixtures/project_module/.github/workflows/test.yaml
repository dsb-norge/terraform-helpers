name: Test
on:
  pull_request:
    branches: [main]
env:
  terraform-version: "1.6.5"
  tflint-version: "v0.55.0"
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.terraform-version }}
